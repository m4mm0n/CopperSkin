name: CopperSkin CI

on:
  push:
    branches: [ main, "feature/**" ]
    tags: [ "v0.3.*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore .\CopperSkin.slnx
      - name: Build
        run: dotnet build .\CopperSkin.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test .\CopperSkin.slnx --configuration Release --no-build --no-restore
      - name: Pack Core
        run: dotnet pack .\src\CopperSkin.Core\CopperSkin.Core.csproj --configuration Release --no-build --no-restore --output .\artifacts\packages
      - name: Pack WPF
        run: dotnet pack .\src\CopperSkin.Wpf\CopperSkin.Wpf.csproj --configuration Release --no-build --no-restore --output .\artifacts\packages
      - name: Validate repository
        shell: pwsh
        run: |
          git diff --check
          $packages = @(Get-ChildItem .\artifacts\packages\*.nupkg)
          foreach ($packageId in @('CopperSkin.Core', 'CopperSkin.Wpf')) {
            if (-not ($packages.Name -match "^$packageId\.\d")) {
              throw "$packageId package was not produced."
            }
          }

  publish:
    if: startsWith(github.ref, 'refs/tags/v0.3.')
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Pack release packages
        run: dotnet pack .\src\CopperSkin.Core\CopperSkin.Core.csproj --configuration Release --output .\artifacts\packages; dotnet pack .\src\CopperSkin.Wpf\CopperSkin.Wpf.csproj --configuration Release --output .\artifacts\packages

      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: m4mm0n

      - name: Publish packages
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          Get-ChildItem .\artifacts\packages\*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
