<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">CopperSkin graphics workflow</title>
  <desc id="desc">A dark themed workflow from document model to editor to runtime and export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#171221"/><stop offset="1" stop-color="#342640"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ffa1f7"/><stop offset="1" stop-color="#b961ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1200" height="500" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" fill="#fff9ff" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">CopperSkin 0.3 graphics workflow</text>
  <text x="60" y="92" fill="#d5bedf" font-family="Segoe UI, sans-serif" font-size="16">One renderer-neutral document powers authoring, runtime display, and deterministic export.</text>
  <g filter="url(#shadow)">
    <rect x="60" y="145" width="270" height="250" rx="18" fill="#241b32" stroke="#735a8c"/>
    <rect x="365" y="125" width="470" height="290" rx="18" fill="#241b32" stroke="#b961ff" stroke-width="2"/>
    <rect x="870" y="145" width="270" height="250" rx="18" fill="#241b32" stroke="#735a8c"/>
  </g>
  <g fill="#fff9ff" font-family="Segoe UI, sans-serif">
    <text x="90" y="185" font-size="20" font-weight="700">Core document</text>
    <text x="90" y="218" font-size="15" fill="#d5bedf">GraphicDocument</text>
    <text x="90" y="247" font-size="15" fill="#d5bedf">layers · shapes · paths</text>
    <text x="90" y="276" font-size="15" fill="#d5bedf">validation · JSON schema</text>
    <text x="90" y="305" font-size="15" fill="#d5bedf">theme-token references</text>
    <text x="90" y="334" font-size="15" fill="#d5bedf">portable .cgraphic files</text>
    <text x="395" y="170" font-size="20" font-weight="700">Designer authoring surface</text>
    <text x="395" y="198" font-size="14" fill="#d5bedf">icon presets · paint canvas · layers · history</text>
    <text x="895" y="185" font-size="20" font-weight="700">Runtime and export</text>
    <text x="895" y="218" font-size="15" fill="#d5bedf">GraphicCanvas / CopperIcon</text>
    <text x="895" y="247" font-size="15" fill="#d5bedf">SVG · XAML · PNG</text>
    <text x="895" y="276" font-size="15" fill="#d5bedf">CLI validate / inspect</text>
    <text x="895" y="305" font-size="15" fill="#d5bedf">theme-aware rendering</text>
  </g>
  <g stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M330 270h35"/><path d="M835 270h35"/>
  </g>
  <g fill="url(#accent)"><path d="m355 260 18 10-18 10z"/><path d="m860 260 18 10-18 10z"/></g>
  <g transform="translate(530 235)">
    <rect width="140" height="140" rx="16" fill="#171221" stroke="#735a8c"/>
    <circle cx="70" cy="70" r="43" fill="none" stroke="#59d98e" stroke-width="12"/>
    <path d="m48 70 15 15 31-36" fill="none" stroke="#fff9ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="60" y="460" fill="#806b8f" font-family="Segoe UI, sans-serif" font-size="13">Vector-first by design · WPF-specific rendering stays at the edge</text>
</svg>
