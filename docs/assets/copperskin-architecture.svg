<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">CopperSkin architecture</title>
  <desc id="desc">CopperSkin Core beneath the WPF runtime, tools, designer, sample application, and theme packs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#101014"/><stop offset="1" stop-color="#211a2d"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop offset="0" stop-color="#b961ff"/><stop offset="1" stop-color="#ffa1f7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .label { font: 600 22px 'Segoe UI', sans-serif; fill: #f8f8ff; }
      .small { font: 400 16px 'Segoe UI', sans-serif; fill: #c9c9d8; }
      .box { fill: #1d1d24; stroke: #666675; stroke-width: 2; }
      .core { fill: #2a2038; stroke: #b961ff; stroke-width: 3; }
      .line { stroke: #b961ff; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>
  <text x="54" y="62" class="label" font-size="30">CopperSkin library architecture</text>
  <text x="54" y="91" class="small">One typed theme model feeding runtime styling, authoring tools, and portable packs.</text>
  <path d="M600 215V175M600 315V425M380 165H460M740 165H820M380 355H460M740 355H820" class="line"/>
  <rect x="460" y="215" width="280" height="100" rx="16" class="core" filter="url(#shadow)"/>
  <text x="600" y="255" text-anchor="middle" class="label">CopperSkin.Core</text>
  <text x="600" y="282" text-anchor="middle" class="small">tokens · validation · signing</text>
  <rect x="70" y="120" width="310" height="90" rx="14" class="box"/>
  <text x="225" y="157" text-anchor="middle" class="label">CopperSkin.Wpf</text>
  <text x="225" y="184" text-anchor="middle" class="small">resources · controls · chrome</text>
  <rect x="820" y="120" width="310" height="90" rx="14" class="box"/>
  <text x="975" y="157" text-anchor="middle" class="label">CopperSkin.Cli</text>
  <text x="975" y="184" text-anchor="middle" class="small">validate · gallery · package</text>
  <rect x="70" y="310" width="310" height="90" rx="14" class="box"/>
  <text x="225" y="347" text-anchor="middle" class="label">Designer</text>
  <text x="225" y="374" text-anchor="middle" class="small">live preview · token editing</text>
  <rect x="820" y="310" width="310" height="90" rx="14" class="box"/>
  <text x="975" y="347" text-anchor="middle" class="label">Kitchen Sink</text>
  <text x="975" y="374" text-anchor="middle" class="small">visual reference app</text>
  <rect x="430" y="425" width="340" height="58" rx="14" fill="url(#accent)"/>
  <text x="600" y="461" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#15111c">.json · .cskin · .lzhc theme packs</text>
</svg>
